<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="4" y1="2" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5498F5"/>
      <stop offset="33%" stop-color="#7B5CF0"/>
      <stop offset="66%" stop-color="#C04FD8"/>
      <stop offset="100%" stop-color="#F06070"/>
    </linearGradient>
  </defs>

  <!-- Document shape with folded top-right corner -->
  <path d="M12,2 H36 L52,18 V46 Q52,54 44,54 H12 Q4,54 4,46 V10 Q4,2 12,2 Z" fill="url(#iconGrad)"/>
  <!-- Fold triangle overlay -->
