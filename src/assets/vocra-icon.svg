  <!-- Circuit tree: top node -->
  <circle cx="28" cy="16" r="2.8" fill="white" fill-opacity="0.9"/>
  <!-- Lines to tier-2 -->
  <path d="M26,18.2 L19,26 M30,18.2 L37,26" stroke="white" stroke-opacity="0.78" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Tier-2 nodes -->
  <circle cx="19" cy="26" r="2.2" fill="white" fill-opacity="0.88"/>
  <circle cx="37" cy="26" r="2.2" fill="white" fill-opacity="0.88"/>
  <!-- Lines to tier-3 -->
  <path d="M17,28 L13,36 M21,28 L26,36 M35,28 L30,36 M39,28 L43,36" stroke="white" stroke-opacity="0.75" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tier-3 nodes -->
  <circle cx="13" cy="36" r="2" fill="white" fill-opacity="0.82"/>
  <circle cx="26" cy="36" r="2" fill="white" fill-opacity="0.82"/>
  <circle cx="30" cy="36" r="2" fill="white" fill-opacity="0.82"/>
  <circle cx="43" cy="36" r="2" fill="white" fill-opacity="0.82"/>
  <!-- Horizontal connector between inner nodes -->
  <line x1="28" y1="36" x2="28" y2="44" stroke="white" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round"/>
</svg>
